  <!-- progress fill -->
  <rect x="100" y="110" width="280" height="12" rx="6" fill="#3bc47d"/>
  <!-- timestamps -->
  <text x="100" y="144" class="meta" fill="#ffffff" fill-opacity="0.6">00:00</text>
