<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@900&display=swap');
      .name { font-family: 'Manrope', system-ui, sans-serif; font-weight: 900; font-size: 116px; letter-spacing: -0.06em; }
      .meta { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; letter-spacing: 0.08em; }
    ]]></style>
  </defs>
  <!-- wordmark -->
  <text x="240" y="80" text-anchor="middle" class="name" fill="#ffffff">tucv<tspan fill="#3bc47d">.</tspan>es</text>
